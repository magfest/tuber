---
name: Backend - Run Tests

on:
  workflow_dispatch:
  push:
    paths:
    - 'backend/**'
    - '.github/workflows/ci-backend.yaml'
    - '.github/workflows/run-tests.yaml'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for CRLF endings
        run: ./scripts/check-crlf.sh

      - name: Lowercase repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build Test Image
        uses: docker/build-push-action@v6
        with:
          context: "./backend"
          target: test
          load: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}-backend:latest

      - name: Run Tests
        run: |
          mkdir -p $GITHUB_WORKSPACE/cov
          sudo chown -R 1000:1000 $GITHUB_WORKSPACE/cov
          sudo chmod g+s $GITHUB_WORKSPACE/cov
          docker compose run \
          --volume $GITHUB_WORKSPACE/cov:/cov \
          -u 1000 \
          backend sh -c \
          "coverage run --data-file=/cov/.coverage -m pytest tests/ && coverage xml --data-file=/cov/.coverage -o /cov/coverage.xml"
        env:
          REPO_NAME: ${{ steps.repo.outputs.name }}
